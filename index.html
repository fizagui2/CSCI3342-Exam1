<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/styles.css" />    

  <title>Random User Generator</title>
</head>
<body>
  <div>

      <!-- Navigation -->
      <header class="p-3 text-bg-dark">
        <div class="container">
          <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">

            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
              <svg class="bi me-2" width="40" height="32" role="img" aria-label="Bootstrap">
                <use xlink:href="#bootstrap"></use>
              </svg>
            </a>

            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">

              <!-- refreshes the page -->
              <li>
                <a href="index.html" class="nav-link px-2 text-secondary">Home</a>
              </li>

              <!-- links to GitHub profile -->
              <li>
                <a href="https://github.com/fizagui2" 
                   target="_blank" 
                   class="nav-link px-2 text-white">GitHub</a>
              </li>

            </ul>

            <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
              <input type="search"
                class="form-control form-control-dark text-bg-dark"
                placeholder="Search..."
                aria-label="Search">
            </form>

            <div class="text-end">
              <button type="button" class="btn btn-outline-light me-2">Login</button>
              <button type="button" class="btn btn-warning">Sign-up</button>
            </div>

          </div>
        </div>
      </header>

      <!-- Header -->
      <div class="header1">
        <h1>CSCI 3342 Midterm Exam</h1>
        <h2>Random User Generator</h2>
      </div>

      <!-- Main Content: Profile Card -->
      <div class="profile-container">
        <div class="profile">
          <div class="image">
            <img src="./images/user.jpg" />
          </div>

          <div class="details">
            <p>Name: <span id="name">Full name</span></p>
            <p>Email:
              <span id="email">email@gmail.com</span>
            </p>
            <p>Location: <span id="address">Edinburg, TX</span></p>
            <p>Age: <span id="age">30</span></p>
          </div>

        </div>
      </div>

      <!-- Next Button -->
      <div class="next">
        <button id="next-btn" class="relative bg-black text-white px-4 py-2 rounded w-full my-4">
          Next Profile
        </button>
      </div>

  </div>

  <!-- scripts -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>  
  <script src="./js/script.js"></script>

</body>
</html>
